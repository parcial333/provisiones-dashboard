<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Provisiones Mensuales</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --surface: #ffffff; --surface2: #f5f5f3;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --radius: 12px; --radius-sm: 8px;
    --green-bg: #eaf3de; --green-text: #3b6d11; --green-border: #97c459;
    --yellow-bg: #faeeda; --yellow-text: #854f0b; --yellow-border: #ef9f27;
    --red-bg: #fcebeb; --red-text: #a32d2d; --red-border: #e24b4a;
    --blue: #378ADD;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 820px; margin: 0 auto; }
  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; }
  header p { font-size: 13px; color: var(--text2); margin-top: 3px; }

  .pais-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 16px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .pais-row label { font-size: 13px; color: var(--text2); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .pais-select-wrap { flex: 1; position: relative; display: flex; align-items: center; min-width: 160px; }
  .pais-select-wrap select { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--text); outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; padding-right: 20px; }
  .pais-select-wrap svg { position: absolute; right: 0; pointer-events: none; color: var(--text3); }
  .fx-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border); white-space: nowrap; }
  .fx-badge.loaded { background: #e6f1fb; border-color: #b3d4f5; color: var(--blue); font-weight: 500; }

  .entry-section { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.25rem; }
  .entry-header { display: grid; grid-template-columns: 36px 1fr 1fr 36px; background: var(--surface2); border-bottom: 0.5px solid var(--border); padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .entry-row { display: grid; grid-template-columns: 36px 1fr 1fr 36px; align-items: center; border-bottom: 0.5px solid var(--border); }
  .entry-row:last-child { border-bottom: none; }
  .entry-row .idx { font-size: 11px; color: var(--text3); text-align: center; }
  .entry-row input[type="month"],
  .entry-row input[type="number"] { border: none; border-left: 0.5px solid var(--border); background: transparent; font-size: 13px; color: var(--text); padding: 9px 12px; width: 100%; outline: none; }
  .entry-row input[type="number"] { border-right: 0.5px solid var(--border); }
  .entry-row input:focus { background: #f0f7ff; }
  .entry-row input::placeholder { color: var(--text3); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 0; transition: color .15s; }
  .del-btn:hover { color: var(--red-text); }
  .add-row { display: flex; align-items: center; gap: 7px; padding: 9px 12px; cursor: pointer; color: var(--blue); font-size: 13px; font-weight: 500; background: none; border: none; width: 100%; transition: background .15s; }
  .add-row:hover { background: var(--surface2); }
  .tag-last3 { font-size: 10px; font-weight: 600; color: var(--blue); background: #e6f1fb; border-radius: 4px; padding: 2px 6px; margin-left: 4px; }

  hr.divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  .summary-table { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; border-collapse: collapse; margin-bottom: 1.25rem; }
  .summary-table th { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; background: var(--surface2); padding: 9px 16px; text-align: left; border-bottom: 0.5px solid var(--border); }
  .summary-table td { padding: 12px 16px; font-size: 14px; border-bottom: 0.5px solid var(--border); }
  .summary-table tr:last-child td { border-bottom: none; }
  .val { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .usd-val { font-size: 13px; color: var(--text2); font-variant-numeric: tabular-nums; }
  .date-cell { color: var(--text2); font-size: 13px; }

  .var-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .var-card { border-radius: var(--radius); padding: 16px 18px; border: 0.5px solid var(--border); }
  .var-card .vc-label { font-size: 11px; font-weight: 600; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
  .var-card .vc-route { font-size: 11px; margin-bottom: 8px; opacity: .75; }
  .var-card .vc-pct { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .var-card .vc-abs { font-size: 11px; margin-top: 3px; opacity: .75; font-variant-numeric: tabular-nums; }
  .var-card.green { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .var-card.yellow { background: var(--yellow-bg); border-color: var(--yellow-border); color: var(--yellow-text); }
  .var-card.red { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
  .var-card.neutral { background: var(--surface2); border-color: var(--border); color: var(--text2); }

  .alert { display: flex; align-items: flex-start; gap: 10px; border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 8px; font-size: 13px; }
  .alert svg { flex-shrink: 0; margin-top: 1px; }
  .alert.green { background: var(--green-bg); color: var(--green-text); }
  .alert.yellow { background: var(--yellow-bg); color: var(--yellow-text); }
  .alert.red { background: var(--red-bg); color: var(--red-text); }

  .leyenda { display: flex; gap: 16px; flex-wrap: wrap; padding: 10px 14px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); margin-top: 1rem; }
  .ley-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .ley-dot { width: 10px; height: 10px; border-radius: 3px; }

  .placeholder { text-align: center; padding: 2rem 1rem; color: var(--text3); font-size: 13px; background: var(--surface2); border: 0.5px dashed var(--border2); border-radius: var(--radius); }
  .placeholder svg { display: block; margin: 0 auto 8px; opacity: .5; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Provisiones mensuales</h1>
    <p>Historial acumulado — el análisis considera siempre los últimos 3 meses</p>
  </header>

  <div class="pais-row">
    <label for="pais">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      País / análisis
    </label>
    <div class="pais-select-wrap">
      <select id="pais" onchange="onPaisChange()">
        <option value="">— Seleccionar país —</option>
        <option>Guatemala</option>
        <option>El Salvador</option>
        <option>Honduras</option>
        <option>Nicaragua</option>
        <option>Costa Rica</option>
        <option>Ecuador</option>
        <option>Jamaica</option>
        <option>Barbados</option>
        <option>Belice</option>
        <option>Trinidad</option>
        <option>Guyana</option>
        <option>Antigua</option>
        <option>Dominica</option>
        <option>Grenada</option>
        <option>St. Kitts</option>
        <option>St. Lucia</option>
        <option>St. Vincent</option>
      </select>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div id="fx-badge" class="fx-badge loaded" style="display:none;"></div>
  </div>

  <div class="entry-section">
    <div class="entry-header">
      <span>#</span><span>Fecha</span><span>Provisión</span><span></span>
    </div>
    <div id="rows-container"></div>
    <button class="add-row" onclick="addRow()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Agregar mes
    </button>
  </div>

  <div id="results">
    <div class="placeholder">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
      Ingresa al menos dos meses para ver el análisis
    </div>
  </div>
</div>

<script>
const CURRENCIES = {
  'Guatemala':   { code: 'GTQ', symbol: 'Q',    fixed: 7.63   },
  'El Salvador': { code: 'USD', symbol: '$',    fixed: 1      },
  'Honduras':    { code: 'HNL', symbol: 'L',    fixed: 26.64  },
  'Nicaragua':   { code: 'NIO', symbol: 'C$',   fixed: 36.61  },
  'Costa Rica':  { code: 'CRC', symbol: '\u20a1',    fixed: 455.24 },
  'Ecuador':     { code: 'USD', symbol: '$',    fixed: 1      },
  'Jamaica':     { code: 'JMD', symbol: 'J$',   fixed: 157.28 },
  'Barbados':    { code: 'BBD', symbol: 'Bds$', fixed: 2      },
  'Belice':      { code: 'BZD', symbol: 'BZ$',  fixed: 2      },
  'Trinidad':    { code: 'TTD', symbol: 'TT$',  fixed: 6.77   },
  'Guyana':      { code: 'GYD', symbol: 'G$',   fixed: 208.50 },
  'Antigua':     { code: 'XCD', symbol: 'EC$',  fixed: 2.7    },
  'Dominica':    { code: 'XCD', symbol: 'EC$',  fixed: 2.7    },
  'Grenada':     { code: 'XCD', symbol: 'EC$',  fixed: 2.7    },
  'St. Kitts':   { code: 'XCD', symbol: 'EC$',  fixed: 2.7    },
  'St. Lucia':   { code: 'XCD', symbol: 'EC$',  fixed: 2.7    },
  'St. Vincent': { code: 'XCD', symbol: 'EC$',  fixed: 2.7    },
};

const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
let rows = [{ f: '', p: '' }, { f: '', p: '' }, { f: '', p: '' }];
let currentCurrency = null;

const svgCheck = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
const svgWarn  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
const svgAlert = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
const svgX     = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const svgBell  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`;
const svgGlobe = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;

function fmtDate(v) {
  if (!v) return '—';
  const [y, m] = v.split('-');
  return MONTHS[+m - 1] + ' ' + y;
}
function fmtNum(n) {
  return n.toLocaleString('es-SV', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function pctChange(a, b) {
  if (!a || a === 0) return null;
  return ((b - a) / Math.abs(a)) * 100;
}
function colorClass(pct) {
  if (pct === null) return 'neutral';
  const a = Math.abs(pct);
  if (a < 5) return 'green';
  if (a <= 15) return 'yellow';
  return 'red';
}
function iconFor(cls) {
  if (cls === 'green') return svgCheck;
  if (cls === 'yellow') return svgWarn;
  return svgAlert;
}
function alertText(pct, f1, f2) {
  const sign = pct >= 0 ? '+' : '';
  const route = fmtDate(f1) + ' \u2192 ' + fmtDate(f2);
  const a = Math.abs(pct);
  if (a < 5)  return 'Sin alerta (' + route + '): variaci\u00f3n de <strong>' + sign + pct.toFixed(2) + '%</strong>, dentro del rango normal.';
  if (a <= 15) return 'Cambio moderado (' + route + '): variaci\u00f3n de <strong>' + sign + pct.toFixed(2) + '%</strong>. Monitorear.';
  return 'Cambio significativo (' + route + '): variaci\u00f3n de <strong>' + sign + pct.toFixed(2) + '%</strong>. Se recomienda revisi\u00f3n.';
}

function onPaisChange() {
  const pais = document.getElementById('pais').value;
  currentCurrency = CURRENCIES[pais] || null;
  const badge = document.getElementById('fx-badge');
  if (!pais || !currentCurrency) { badge.style.display = 'none'; render(); return; }
  const cur = currentCurrency;
  badge.style.display = 'flex';
  if (cur.code === 'USD') {
    badge.innerHTML = svgCheck + ' Moneda USD (sin conversi\u00f3n)';
  } else {
    badge.innerHTML = svgCheck + ' 1 USD = ' + fmtNum(cur.fixed) + ' ' + cur.code + ' <span style="opacity:.6;font-weight:400">(promedio)</span>';
  }
  render();
}

function renderRows() {
  const c = document.getElementById('rows-container');
  c.innerHTML = rows.map(function(r, i) {
    const isLast3 = i >= rows.length - 3;
    return '<div class="entry-row">' +
      '<span class="idx" style="' + (isLast3 ? 'color:var(--blue);font-weight:600;' : '') + '">' + (i + 1) + '</span>' +
      '<input type="month" value="' + r.f + '" oninput="updateRow(' + i + ',\'f\',this.value)" />' +
      '<input type="number" placeholder="0.00" step="0.01" value="' + r.p + '" oninput="updateRow(' + i + ',\'p\',this.value)" />' +
      '<button class="del-btn" onclick="deleteRow(' + i + ')" title="Eliminar">' + svgX + '</button>' +
      '</div>';
  }).join('');
}

function updateRow(i, k, v) { rows[i][k] = v; render(); }
function addRow() { rows.push({ f: '', p: '' }); renderRows(); render(); }
function deleteRow(i) { if (rows.length <= 1) return; rows.splice(i, 1); renderRows(); render(); }

function render() {
  renderRows();
  const pais = document.getElementById('pais').value.trim();
  const el = document.getElementById('results');
  const valid = rows.filter(function(r) { return r.p !== '' && !isNaN(parseFloat(r.p)); });
  const last3 = valid.slice(-3);
  const cur = currentCurrency;
  const showUSD = cur && cur.code !== 'USD';

  if (last3.length < 2) {
    el.innerHTML = '<div class="placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>Ingresa al menos dos meses con valor de provisi\u00f3n para ver el an\u00e1lisis</div>';
    return;
  }

  const nums  = last3.map(function(r) { return parseFloat(r.p); });
  const fechas = last3.map(function(r) { return r.f; });
  const sym = cur ? cur.symbol : '';
  const rate = cur ? 1 / cur.fixed : null;
  const usdHeader = showUSD ? '<th>USD <span style="font-size:10px;font-weight:400;opacity:.6">(ref.)</span></th>' : '';

  const tableRows = last3.map(function(r, i) {
    const pct = i === 0 ? null : pctChange(nums[i-1], nums[i]);
    const cls = colorClass(pct);
    const varCell = i === 0
      ? '<span style="color:var(--text3);font-size:12px;">Referencia</span>'
      : (pct !== null ? '<span style="font-weight:600;color:var(--' + cls + '-text)">' + (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%</span>' : '—');
    const usdCell = showUSD
      ? '<td class="usd-val">$ ' + fmtNum(nums[i] * rate) + '</td>'
      : '';
    return '<tr><td class="date-cell">' + (fmtDate(r.f) || ('Mes ' + (i+1))) + '</td><td class="val">' + (sym ? sym + '&nbsp;' : '') + fmtNum(nums[i]) + '</td>' + usdCell + '<td>' + varCell + '</td></tr>';
  }).join('');

  const pairs = last3.slice(0,-1).map(function(r, i) {
    const pct = pctChange(nums[i], nums[i+1]);
    const cls = colorClass(pct);
    return pct !== null
      ? '<div class="var-card ' + cls + '"><div class="vc-label">' + iconFor(cls) + ' Variaci\u00f3n Mes ' + (i+1) + ' \u2192 ' + (i+2) + '</div><div class="vc-route">' + fmtDate(fechas[i]) + ' \u2192 ' + fmtDate(fechas[i+1]) + '</div><div class="vc-pct">' + (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%</div><div class="vc-abs">Diferencia: ' + (sym ? sym+' ' : '') + fmtNum(nums[i+1]-nums[i]) + '</div></div>'
      : '';
  }).join('');

  const alertas = last3.slice(0,-1).map(function(r, i) {
    const pct = pctChange(nums[i], nums[i+1]);
    if (pct === null) return '';
    const cls = colorClass(pct);
    return '<div class="alert ' + cls + '">' + iconFor(cls) + '<span>' + alertText(pct, fechas[i], fechas[i+1]) + '</span></div>';
  }).join('');

  const tag = rows.length > 3 ? '<span class="tag-last3">\u00daltimos 3 meses</span>' : '';
  const rateNote = showUSD ? '<span style="font-size:11px;font-weight:400;color:var(--text3);margin-left:8px;">1 USD = ' + fmtNum(cur.fixed) + ' ' + cur.code + '</span>' : '';

  el.innerHTML =
    '<div class="section-title">' + (pais ? svgGlobe + ' ' + pais + ' \u2014' : '') + ' Resumen de provisiones ' + tag + rateNote + '</div>' +
    '<table class="summary-table"><thead><tr><th>Mes</th><th>Provisi\u00f3n (' + (cur ? cur.code : 'local') + ')</th>' + usdHeader + '<th>Variaci\u00f3n</th></tr></thead><tbody>' + tableRows + '</tbody></table>' +
    (pairs ? '<div class="var-grid">' + pairs + '</div>' : '') +
    '<hr class="divider" />' +
    '<div class="section-title">' + svgBell + ' Alertas</div>' +
    alertas +
    '<div class="leyenda"><span class="ley-item"><span class="ley-dot" style="background:var(--green-border);"></span>Normal &lt; 5%</span><span class="ley-item"><span class="ley-dot" style="background:var(--yellow-border);"></span>Moderado 5\u201315%</span><span class="ley-item"><span class="ley-dot" style="background:var(--red-border);"></span>Significativo &gt; 15%</span></div>';
}

render();
</script>
</body>
</html>
